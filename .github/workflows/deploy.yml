name: Deploy

# Runs only after the CI workflow completes on main (gate added 2026-05-31 so a
# lint/test failure can no longer ship — previously Deploy ran on push in
# parallel with CI). workflow_dispatch stays for manual deploys.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # A manual run has no workflow_run payload (conclusion is empty), so allow it
    # outright; a CI-triggered run must have concluded successfully.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: SSH into VPS and update
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes \
            "root@$VPS_HOST" 'bash /opt/ai-arena-recap/deploy/update.sh'
