name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --all-groups --frozen

      - name: Lint (ruff)
        run: uv run ruff check src tests

      - name: Test (pytest)
        env:
          AIARENA_API_TOKEN: dummy-token-for-tests
        run: uv run pytest
